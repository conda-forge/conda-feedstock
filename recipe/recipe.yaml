schema_version: 1

context:
  version: "26.5.2"
  sha256: 4c0227d37f7a54b332fea5b12ba855252ca80fbc1452bb66522eb74084039be5

package:
  name: conda
  version: ${{ version }}

source:
  url: https://github.com/conda/conda/releases/download/${{ version }}/conda-${{ version }}.tar.gz
  sha256: ${{ sha256 }}
  target_directory: conda-src

build:
  number: 2
  script:
    content:
      # Prevents issues like https://github.com/conda-forge/conda-feedstock/issues/280
      - rm -rf conda-src/tests/
      - ${{ PYTHON }} -m pip install conda-src/ --no-deps --no-build-isolation -vv && ${{ PYTHON }} -m conda init --install
  always_include_files:
    # These are present when the new environment is created
    # so we have to exempt them from the list of initial files
    # for conda-build to realize they should be included.
    - if: unix
      then:
        - bin/conda
        - bin/activate
        - bin/deactivate
    - if: win
      then:
        - Scripts/activate.bat
        - Scripts/activate
        - Scripts/deactivate

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
    - if: win
      then: 
        - m2-filesystem
        - m2-bash
        - m2-base
  host:
    - python
    - pip
    - hatchling >=1.12.2
    - hatch-vcs >=0.2.0
    # for `conda init` in build/script above
    - boltons >=23.0.0
    - frozendict >=2.4.2
    - menuinst >=2
    - platformdirs >=3.10.0
    - requests >=2.28.0,<3
    - ruamel.yaml >=0.11.14,<0.19
    - tqdm >=4
  run:
    - archspec >=0.2.3
    - boltons >=23.0.0
    - charset-normalizer
    - conda-package-handling >=2.2.0
    - distro >=1.5.0
    - frozendict >=2.4.2
    - jsonpatch >=1.32
    - menuinst >=2
    - packaging >=23.0
    - platformdirs >=3.10.0
    - pluggy >=1.6.0
    - pycosat >=0.6.3
    - python
    - requests >=2.28.0,<3
    - ruamel.yaml >=0.11.14,<0.19
    - setuptools >=60.0.0
    - tqdm >=4
    - truststore >=0.8.0
    - zstandard >=0.19.0
    # Plugins to bundle with conda
    - conda-libmamba-solver >=26.4.1
    - conda-lockfiles >=0.2.0
    - conda-self >=0.2.0
    - conda-pypi >=0.9.0
    - conda-rattler-solver >=0.1.1
  run_constraints:
    - conda-build >=25.9
    - conda-content-trust >=0.3.0
    - conda-env >=2.6

tests:
  - python:
      imports:
        - conda
      pip_check: false
  - if: match(python, ">=3.12") and match(python, "<3.14") and not osx
    # the minimum python ^^^^ version here needs to match
    # the minimum version for the bot code base
    # package `conda-forge-tick`
    then:
      downstream: conda-smithy
  - script:
      - if: win
        then:
          - run_test.bat
      - if: unix
        then:
          - run_test.sh
    files:
      recipe:
        - if: win
          then:
            - run_test.bat
        - if: unix
          then:
            - run_test.sh

about:
  license: BSD-3-Clause
  license_file: conda-src/LICENSE
  summary: OS-agnostic, system-level binary package and environment manager.
  description: |
    Conda is an open source package management system and environment
    management system for installing multiple versions of software packages
    and their dependencies and switching easily between them. It works on
    Linux, OS X and Windows, and was created for Python programs but can
    package and distribute any software.
  homepage: https://conda.io
  repository: https://github.com/conda/conda
  documentation: https://docs.conda.io/projects/conda/en/stable/

extra:
  recipe-maintainers:
    - dbast
    - isuruf
    - jakirkham
    - jezdez
    - kenodegard
    - mbargull
    - ocefpaf
    - beeankha
